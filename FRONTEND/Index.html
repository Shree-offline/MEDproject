<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MEDD App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>MEDD App</h1>
        <p>Stock Management & Medicine Purchase System</p>
    </header>

    <main class="container">

        <!-- Admin Section -->
        <section class="card">
            <h2>Admin Panel</h2>
            <input type="password" placeholder="Enter Admin Password">
            <input type="text" placeholder="Medicine Name">
            <input type="number" placeholder="Quantity">
            <button class="btn admin">Restock Medicine</button>
        </section>

        <!-- User Section -->
        <section class="card">
            <h2>User Panel</h2>
            <input type="text" placeholder="Medicine Name">
            <input type="number" placeholder="Quantity">
            <button class="btn user">Buy Medicine</button>
        </section>

    </main>

    <script>
    // 1. The address of your live backend
    const apiURL = "https://medproject-5.onrender.com"; 

    // 2. Function to get inventory from the server
    async function getInventory() {
        try {
            const response = await fetch(`${apiURL}/inventory`);
            const data = await response.json();
            console.log("Medicine Data:", data);
            
            // This part updates your HTML. 
            // Make sure you have an element with id="display" in your HTML!
            document.getElementById("display").innerHTML = JSON.stringify(data, null, 2);
        } catch (error) {
            console.error("Error fetching data:", error);
        }
    }

    // Run the function when the page opens
    getInventory();
</script>

    <footer>
        <p>© 2026 MEDD App | Inventory Management System</p>
    </footer>

</body>
</html>
