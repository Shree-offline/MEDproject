<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Medicine Shop</title>
    <link rel="stylesheet" href="style.css"> </head>
<body>
    <div class="container">
        <h2>Medicine Shop</h2>
        <p>Enter medicine name and quantity to see price</p>
        <input type="text" id="med-select" placeholder="Medicine Name (e.g. Paracetamol)">
        <input type="number" id="buy-qty" placeholder="Quantity" oninput="calculateTotal()">
        
        <div id="price-display" class="price-tag">Total: $0.00</div>
        
        <button onclick="alert('Proceeding to Checkout...')">Proceed to Buy</button>
        <button class="secondary" onclick="location.href='index.html'">Back to Home</button>
    </div>
    <script src="script.js"></script>
</body>
</html>
