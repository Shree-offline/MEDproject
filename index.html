<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MEDD App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>MEDD App</h1>
        <p>Stock Management & Medicine Purchase System</p>
    </header>

    <main class="container">

        <!-- Admin Section -->
        <section class="card">
            <h2>Admin Panel</h2>
            <input type="password" placeholder="Enter Admin Password">
            <input type="text" placeholder="Medicine Name">
            <input type="number" placeholder="Quantity">
            <button class="btn admin">Restock Medicine</button>
        </section>

        <!-- User Section -->
        <section class="card">
            <h2>User Panel</h2>
            <input type="text" placeholder="Medicine Name">
            <input type="number" placeholder="Quantity">
            <button class="btn user">Buy Medicine</button>
        </section>

    </main>

    <script>
    // 1. The address of your live backend
    const apiURL = "https://medproject-5.onrender.com"; 

    // 2. Function to get inventory from the server
    async function getInventory() {
        try {
            const response = await fetch(`${apiURL}/inventory`);
            const data = await response.json();
            console.log("Medicine Data:", data);
            
            // This part updates your HTML. 
            // Make sure you have an element with id="display" in your HTML!
            document.getElementById("display").innerHTML = JSON.stringify(data, null, 2);
        } catch (error) {
            console.error("Error fetching data:", error);
        }
    }

    // Run the function when the page opens
    getInventory();
        async function restock() {
    const password = document.getElementById("adminPass").value;
    const item = document.getElementById("medName").value;
    const quantity = document.getElementById("medQty").value;
    const statusMsg = document.getElementById("statusMsg");

    const response = await fetch(`${apiURL}/restock`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ password, item, quantity })
    });

    const result = await response.json();
    
    if (response.ok) {
        statusMsg.innerText = "Success: " + result.message;
        statusMsg.style.color = "green";
        getInventory(); // Refresh the list automatically!
    } else {
        statusMsg.innerText = "Error: " + result.message;
        statusMsg.style.color = "red";
    }
}
</script>
<script>
    const apiURL = "https://medproject-5.onrender.com";

    // --- FUNCTION FOR THE USER PANEL (BUY) ---
    async function buyMedicine() {
        // This matches the IDs in your User Panel
        const item = document.querySelector('.User-Panel input[type="text"]').value;
        const qty = document.querySelector('.User-Panel input[type="number"]').value;

        const response = await fetch(`${apiURL}/buy`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ medicine: item, quantity: qty })
        });

        const result = await response.json();
        alert(result.message); // This will pop up and tell you if it worked!
    }

    // --- FUNCTION FOR THE ADMIN PANEL (RESTOCK) ---
    async function restockMedicine() {
        // This matches the IDs in your Admin Panel
        const password = document.querySelector('.Admin-Panel input[type="password"]').value;
        const item = document.querySelector('.Admin-Panel input[type="text"]').value;
        const qty = document.querySelector('.Admin-Panel input[type="number"]').value;

        const response = await fetch(`${apiURL}/restock`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ password: password, item: item, quantity: qty })
        });

        const result = await response.json();
        alert(result.message);
    }

    // Connect the buttons to the functions
    document.querySelector('.btn-buy').onclick = buyMedicine;
    document.querySelector('.btn-restock').onclick = restockMedicine;
</script>
        <p>© 2026 MEDD App | Inventory Management System</p>
    </footer>

</body>
</html>
