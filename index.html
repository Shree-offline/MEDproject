<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MEDD App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>MEDD App</h1>
        <p>Stock Management & Medicine Purchase System</p>
    </header>

    <main class="container">

        <!-- Admin Section -->
        <section class="card">
            <h2>Admin Panel</h2>
            <input type="password" placeholder="Enter Admin Password">
            <input type="text" placeholder="Medicine Name">
            <input type="number" placeholder="Quantity">
            <button class="btn admin">Restock Medicine</button>
        </section>

        <!-- User Section -->
        <section class="card">
            <h2>User Panel</h2>
            <input type="text" placeholder="Medicine Name">
            <input type="number" placeholder="Quantity">
            <button class="btn user">Buy Medicine</button>
        </section>

    </main>
<script>
    const apiURL = "https://medproject-5.onrender.com";

    // --- RESTOCK FUNCTION ---
    async function handleRestock() {
        const password = document.getElementById("adminPass").value;
        const item = document.getElementById("adminItem").value;
        const qty = document.getElementById("adminQty").value;

        try {
            const response = await fetch(`${apiURL}/restock`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ password, item, quantity: qty })
            });
            const data = await response.json();
            alert(data.message);
        } catch (err) {
            alert("Error: Backend is sleeping or URL is wrong.");
        }
    }

    // --- BUY FUNCTION ---
    async function handleBuy() {
        const item = document.getElementById("userItem").value;
        const qty = document.getElementById("userQty").value;

        try {
            const response = await fetch(`${apiURL}/buy`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ medicine: item, quantity: qty })
            });
            const data = await response.json();
            alert(data.message);
        } catch (err) {
            alert("Error: Check your internet or Render link.");
        }
    }

    // --- CONNECT BUTTONS ---
    document.getElementById("btn-restock").onclick = handleRestock;
    document.getElementById("btn-buy").onclick = handleBuy;
</script>
